<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe</title>
   <link rel="stylesheet" href="game.css">
</head>
<body>

<div class="ttt-wrap">
  <h1>Tic Tac Toe</h1>

  <div class="scoreboard">
    <div class="score-card x-card">
      <div class="label">Player X</div>
      <div class="val" id="score-x">0</div>
    </div>
    <div class="score-card draw-card">
      <div class="label">Draws</div>
      <div class="val" id="score-d">0</div>
    </div>
    <div class="score-card o-card">
      <div class="label">Player O</div>
      <div class="val" id="score-o">0</div>
    </div>
  </div>

  <div class="status" id="status">
    <span><span class="dot x"></span><span class="highlight">X's turn</span></span>
  </div>

  <div class="board" id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div class="btn-row">
    <button id="btn-reset">New Game</button>
    <button id="btn-clear">Clear Scores</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
